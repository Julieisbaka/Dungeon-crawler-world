# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# rust-clippy is a tool that runs a bunch of lints to catch common
# mistakes in your Rust code and help improve your Rust code.
# More details at https://github.com/rust-lang/rust-clippy
# and https://rust-lang.github.io/rust-clippy/

name: rust-clippy analyze

on:
  push:
    branches: [ "Main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "Main" ]
  schedule:
    - cron: '21 11 * * 3'

jobs:
  rust-clippy-analyze:
    name: Run rust-clippy analyzing
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache apt packages
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-vulkan-x11-v1
          restore-keys: ${{ runner.os }}-apt-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libx11-dev libxrandr-dev libxcursor-dev libxi-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo tools (clippy-sarif, sarif-fmt)
        id: cache-cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/clippy-sarif
            ~/.cargo/bin/sarif-fmt
          key: cargo-tools-clippy-sarif-0.7.0-sarif-fmt-0.7.0

      - name: Install required cargo tools
        if: steps.cache-cargo-tools.outputs.cache-hit != 'true'
        run: |
          cargo install --locked clippy-sarif --version 0.7.0
          cargo install --locked sarif-fmt --version 0.7.0

      - name: Run rust-clippy and generate raw SARIF
        # continue-on-error allows the SARIF upload to proceed even when clippy
        # finds issues. set -euo pipefail is intentionally omitted here: combining
        # it with continue-on-error would abort the shell script early (before the
        # SARIF file is written) while still marking the step as tolerated by
        # GitHub Actions, making failure handling ambiguous. Downstream steps that
        # require the SARIF file keep their own set -euo pipefail.
        continue-on-error: true
        shell: bash
        run: |
          # Capture clippy JSON to a file first, then convert in a separate step.
          # This avoids partial SARIF output from a broken pipe.
          cargo clippy \
            --all-features \
            --message-format=json \
            > /tmp/rust-clippy-output.jsonl

          clippy-sarif < /tmp/rust-clippy-output.jsonl > /tmp/rust-clippy-results.raw.sarif

      - name: Format SARIF
        shell: bash
        run: |
          set -euo pipefail
          # Display human-readable results in the action log.
          sarif-fmt < /tmp/rust-clippy-results.raw.sarif || true
          # Use the raw SARIF JSON (not the human-readable sarif-fmt output) for upload.
          cp /tmp/rust-clippy-results.raw.sarif rust-clippy-results.sarif

      - name: Validate SARIF JSON
        shell: bash
        run: |
          set -euo pipefail
          test -s rust-clippy-results.sarif
          python -c "import json, pathlib; json.loads(pathlib.Path('rust-clippy-results.sarif').read_text(encoding='utf-8'))"

      - name: Upload analysis results to GitHub
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true
