name: Security Alerts to Issues

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:

jobs:
  create-issues-for-alerts:
    runs-on: ubuntu-latest
    permissions:
      security-events: read
      issues: write
    steps:
      - name: Fetch Dependabot alerts and create issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const alerts = await github.rest.dependabot.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            // Fetch code scanning alerts (for third-party and native tools)
            const codeScanningAlerts = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            // Combine all alerts into a single array
            const allAlerts = [
              ...alerts.data.map(a => ({ type: 'dependabot', alert: a })),
              ...codeScanningAlerts.data.map(a => ({ type: 'code-scanning', alert: a }))
            ];

            // Helper: Infer severity if missing
            function inferSeverity(description) {
              if (!description) return 'unknown';
              const desc = description.toLowerCase();
              if (desc.includes('rce') || desc.includes('remote code execution')) return 'critical';
              if (desc.includes('xss') || desc.includes('cross site scripting')) return 'high';
              if (desc.includes('csrf') || desc.includes('cross site request forgery')) return 'high';
              if (desc.includes('dos') || desc.includes('denial of service')) return 'medium';
              if (desc.includes('info leak') || desc.includes('information disclosure')) return 'medium';
              return 'low';
            }

            // Helper: Generate links to docs and community resources
            function generateLinks({ packageName, identifiers }) {
              let links = [];
              if (packageName) {
                links.push(`- [NPM](https://www.npmjs.com/package/${packageName})`);
                links.push(`- [PyPI](https://pypi.org/project/${packageName})`);
              }
              if (identifiers) {
                identifiers.split(',').forEach(id => {
                  const trimmed = id.trim();
                  if (trimmed.startsWith('CVE-')) {
                    links.push(`- [CVE Details](https://cve.mitre.org/cgi-bin/cvename.cgi?name=${trimmed})`);
                  }
                  if (trimmed.startsWith('CWE-')) {
                    links.push(`- [CWE Details](https://cwe.mitre.org/data/definitions/${trimmed.replace('CWE-', '')}.html)`);
                  }
                });
              }
              links.push('- [Stack Overflow: Security Fixes](https://stackoverflow.com/search?q=security+fix)');
              links.push('- [GitHub Discussions: Security](https://github.com/orgs/community/discussions?discussions_q=security)');
              return links.join('\n');
            }

            // Helper: General best practices
            function bestPractices(type) {
              if (type === 'dependabot') {
                return '- Update to the latest non-vulnerable version.\n- Review changelogs for breaking changes.\n- Test thoroughly after upgrading.';
              }
              if (type === 'code-scanning') {
                return '- Validate all user input.\n- Use parameterized queries for database access.\n- Apply the principle of least privilege.\n- Review and refactor unsafe code patterns.';
              }
              return '- Review and apply security best practices for your stack.';
            }

            for (const { type, alert } of allAlerts) {
              // Check if the file referenced in the alert still exists in the repository
              let fileExists = false;
              let filePath, fileRef, alertSummary, alertDescription, alertSeverity, alertUrl, packageName, ecosystem, identifiers, cvss, moreInfo, alertState, createdAt, updatedAt, dismissedAt, dismissedReason, dismissedBy, suggestions;

              if (type === 'dependabot') {
                filePath = alert.most_recent_instance?.location?.path;
                fileRef = alert.most_recent_instance?.ref || 'HEAD';
                alertSummary = alert.security_advisory.summary;
                alertDescription = alert.security_advisory.description;
                alertSeverity = alert.security_advisory.severity;
                alertUrl = alert.html_url;
                packageName = alert.dependency.package.name;
                ecosystem = alert.dependency.package.ecosystem;
                identifiers = alert.security_advisory.identifiers?.map(i => `${i.type}: ${i.value}`).join(', ');
                cvss = alert.security_advisory.cvss?.score;
                moreInfo = alert.security_advisory.references?.map(r => r.url).join('\n');
                alertState = alert.state;
                createdAt = alert.created_at;
                updatedAt = alert.updated_at;
                dismissedAt = alert.dismissed_at;
                dismissedReason = alert.dismissed_reason;
                dismissedBy = alert.dismissed_by?.login;
                suggestions = alert.security_advisory?.recommendation;
              } else if (type === 'code-scanning') {
                filePath = alert.most_recent_instance?.location?.path;
                fileRef = alert.most_recent_instance?.ref || 'HEAD';
                alertSummary = alert.rule?.description || alert.rule_id;
                alertDescription = alert.description;
                alertSeverity = alert.rule?.severity || alert.rule_severity || 'unknown';
                alertUrl = alert.html_url;
                packageName = alert.tool?.name || 'unknown';
                ecosystem = alert.rule?.id || 'unknown';
                identifiers = alert.rule?.tags?.join(', ');
                cvss = alert.security_severity_level || 'N/A';
                moreInfo = alert.rule?.help || '';
                alertState = alert.state;
                createdAt = alert.created_at;
                updatedAt = alert.updated_at;
                dismissedAt = alert.dismissed_at;
                dismissedReason = alert.dismissed_reason;
                dismissedBy = alert.dismissed_by?.login;
                suggestions = alert.rule?.help || '';
              }

              // Infer severity if missing
              if (!alertSeverity || alertSeverity === 'unknown') {
                alertSeverity = inferSeverity(alertDescription);
              }

              // Generate links and best practices
              const extraLinks = generateLinks({ packageName, identifiers });
              const practices = bestPractices(type);

              if (filePath) {
                try {
                  await github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path: filePath,
                    ref: fileRef
                  });
                  fileExists = true;
                } catch (e) {
                  fileExists = false;
                }
              }

              if (!fileExists) continue;

              // Check if an issue already exists for this alert
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} in:title "${alertSummary}"`
              });

              if (search.data.total_count === 0) {
                // Example fix snippet for dependencies
                let exampleFix = '';
                if (type === 'dependabot' && packageName) {
                  exampleFix = `#### Example Fix\n\n\`\`\`bash\nnpm install ${packageName}@latest\n\`\`\`\n`;
                } else if (type === 'code-scanning') {
                  exampleFix = `#### Example Fix\n\n\`\`\`js\n// Example: Add input validation\nfunction validate(input) {\n  if (typeof input !== 'string') throw new Error('Invalid input');\n}\n\`\`\`\n`;
                }

                // Checklist for reviewers
                const checklist = `
#### Review Checklist
- [ ] Confirm vulnerability exists in our codebase
- [ ] Assess exploitability in our context
- [ ] Apply recommended fix or mitigation
- [ ] Test after applying fix
- [ ] Update documentation if needed
`;

                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[Security Alert] ${alertSummary}`,
                  body: `
**Type:** ${type}
**Package/Tool:** ${packageName}
**Ecosystem/Rule:** ${ecosystem}
**Severity:** ${alertSeverity}
**Identifiers:** ${identifiers}
**CVSS Score:** ${cvss}
**State:** ${alertState}
**Path:** ${filePath}
**Ref:** ${fileRef}
**Created At:** ${createdAt}
**Updated At:** ${updatedAt}
${dismissedAt ? `**Dismissed At:** ${dismissedAt}` : ''}
${dismissedReason ? `**Dismissed Reason:** ${dismissedReason}` : ''}
${dismissedBy ? `**Dismissed By:** ${dismissedBy}` : ''}

---

### Vulnerability Description

${alertDescription}

---

### Suggestions / Recommendations

${suggestions || practices}

${exampleFix}

---

### More Information

${moreInfo || '_No additional references._'}

#### Related Resources
${extraLinks}

---

### Ideas & Context

_Add your remediation ideas, context, or related discussion here._

---

${checklist}

#### Timeline
- Alert created: ${createdAt}
- Issue created: ${new Date().toISOString()}
- Status: Open

---

#### Labels for Triage

- \`security\`
- \`${type}\`
- \`${alertSeverity}\`
- \`needs-triage\`
- \`needs-review\`

[View alert in Security tab](${alertUrl})
                  `,
                  labels: ['security', type, alertSeverity, 'needs-triage', 'needs-review']
                });
              }
            }