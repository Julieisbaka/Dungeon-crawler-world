name: Enhanced Security Vulnerability to Issues

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC

permissions:
  security-events: read
  issues: write
  contents: read

jobs:
  find-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get Dependabot Alerts
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const query = `query($owner:String!, $repo:String!) {
              repository(owner:$owner, name:$repo) {
                vulnerabilityAlerts(first: 100, states: [OPEN]) {
                  nodes {
                    id
                    securityVulnerability {
                      package { name }
                      severity
                      advisory {
                        description
                        summary
                        cvss { score vectorString }
                        references { url }
                        publishedAt
                        identifiers { type value }
                      }
                      vulnerableVersionRange
                    }
                    createdAt
                  }
                }
              }
            }`;
            
            const variables = { owner: context.repo.owner, repo: context.repo.repo };
            const result = await github.graphql(query, variables);
            const alerts = result.repository.vulnerabilityAlerts.nodes;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security-vulnerability']
            });
            
            for (const alert of alerts) {
              // Get CVE ID or other primary identifier
              let primaryId = "Unknown";
              let allIds = [];
              
              if (alert.securityVulnerability.advisory.identifiers && 
                  alert.securityVulnerability.advisory.identifiers.length > 0) {
                
                // First try to get a CVE
                const cveIdentifier = alert.securityVulnerability.advisory.identifiers.find(id => id.type === 'CVE');
                if (cveIdentifier) {
                  primaryId = cveIdentifier.value;
                } else {
                  // Fall back to any other identifier
                  primaryId = `${alert.securityVulnerability.advisory.identifiers[0].type}:${alert.securityVulnerability.advisory.identifiers[0].value}`;
                }
                
                // Store all identifiers
                allIds = alert.securityVulnerability.advisory.identifiers.map(id => `${id.type}: ${id.value}`);
              }
              
              // Create a concise title (max 80 chars)
              const pkgName = alert.securityVulnerability.package.name;
              const shortSummary = (alert.securityVulnerability.advisory.summary || 
                                   alert.securityVulnerability.advisory.description || 
                                   "Security vulnerability")
                                   .substring(0, 40).trim();
              
              const issueTitle = `Security: ${pkgName} (${primaryId.split('-')[0]}) - ${shortSummary}`;
              
              // Check for existing issues to avoid duplicates
              const existingIssue = issues.data.find(issue => 
                issue.title.includes(pkgName) && 
                issue.body.includes(primaryId));
                
              if (!existingIssue) {
                try {
                  // Format dates
                  const publishedDate = alert.securityVulnerability.advisory.publishedAt ? 
                    new Date(alert.securityVulnerability.advisory.publishedAt).toISOString().split('T')[0] : 'Unknown';
                  const detectedDate = new Date(alert.createdAt).toISOString().split('T')[0];
                  
                  // Get CVSS data
                  const cvssScore = alert.securityVulnerability.advisory.cvss?.score || 'N/A';
                  const cvssVector = alert.securityVulnerability.advisory.cvss?.vectorString || 'N/A';
                  
                  // NVDAPI for detailed CVE information
                  let nvdData = "";
                  if (primaryId.startsWith('CVE-')) {
                    try {
                      const nvdResponse = await fetch(`https://services.nvd.nist.gov/rest/json/cves/2.0?cveId=${primaryId}`);
                      if (nvdResponse.ok) {
                        const nvdInfo = await nvdResponse.json();
                        if (nvdInfo.vulnerabilities && nvdInfo.vulnerabilities.length > 0) {
                          const vuln = nvdInfo.vulnerabilities[0].cve;
                          
                          // Get descriptions in English
                          let engDescription = "No additional details available";
                          if (vuln.descriptions) {
                            const engDesc = vuln.descriptions.find(d => d.lang === 'en');
                            if (engDesc) engDescription = engDesc.value;
                          }
                          
                          // Get configurations (affected products/versions)
                          let configDetails = [];
                          if (vuln.configurations) {
                            vuln.configurations.forEach(config => {
                              if (config.nodes) {
                                config.nodes.forEach(node => {
                                  if (node.cpeMatch) {
                                    node.cpeMatch.forEach(cpe => {
                                      if (cpe.criteria) {
                                        configDetails.push(`- ${cpe.criteria.replace(/^cpe:2\.3:[aoh]:/, '')}`);
                                      }
                                    });
                                  }
                                });
                              }
                            });
                          }
                          
                          nvdData = [
                            '### Additional Information from NVD',
                            `- **Published**: ${vuln.published ? new Date(vuln.published).toISOString().split('T')[0] : 'Unknown'}`,
                            `- **Last Modified**: ${vuln.lastModified ? new Date(vuln.lastModified).toISOString().split('T')[0] : 'Unknown'}`,
                            `- **NVD Description**: ${engDescription}`,
                            '',
                            '#### Affected Products/Versions',
                            configDetails.length > 0 ? configDetails.join('\n') : '- No specific configuration details available',
                            '',
                            `- **More Details**: [NVD Entry](https://nvd.nist.gov/vuln/detail/${primaryId})`,
                            ''
                          ].join('\n');
                        }
                      }
                    } catch (e) {
                      console.log(`Failed to fetch NVD data: ${e.message}`);
                    }
                  }
                  
                  // OSV API for ecosystem-specific vulnerability info
                  let osvData = "";
                  if (primaryId.startsWith('CVE-') || primaryId.startsWith('GHSA-')) {
                    try {
                      const osvResponse = await fetch(`https://api.osv.dev/v1/vulns/${primaryId}`);
                      if (osvResponse.ok) {
                        const osvInfo = await osvResponse.json();
                        
                        // Get ecosystem-specific details
                        let ecosystems = [];
                        let fixedVersions = [];
                        let ecosystemDetails = [];
                        
                        if (osvInfo.affected) {
                          // Extract ecosystem info
                          osvInfo.affected.forEach(affected => {
                            if (affected.package?.ecosystem) {
                              ecosystems.push(affected.package.ecosystem);
                            }
                            
                            // Extract fixed versions
                            if (affected.ranges) {
                              affected.ranges.forEach(range => {
                                if (range.events) {
                                  const fixEvents = range.events.filter(e => e.fixed);
                                  if (fixEvents.length > 0) {
                                    fixedVersions.push(...fixEvents.map(e => e.fixed));
                                  }
                                }
                              });
                            }
                            
                            // Build detailed ecosystem info
                            if (affected.package?.name) {
                              const pkgInfo = `${affected.package.ecosystem}:${affected.package.name}`;
                              const versions = affected.versions ? `[${affected.versions.join(', ')}]` : 
                                              (affected.ranges ? 'See ranges' : 'Unknown');
                              ecosystemDetails.push(`- **${pkgInfo}**: ${versions}`);
                            }
                          });
                        }
                        
                        osvData = [
                          '### Additional Information from OSV.dev',
                          `- **Ecosystems**: ${ecosystems.length > 0 ? ecosystems.join(', ') : 'Not specified'}`,
                          `- **Fixed in Versions**: ${fixedVersions.length > 0 ? fixedVersions.join(', ') : 'Not specified'}`,
                          '',
                          '#### Affected Packages',
                          ecosystemDetails.length > 0 ? ecosystemDetails.join('\n') : '- No specific package details available',
                          '',
                          `- **More Details**: [OSV.dev entry](https://osv.dev/${primaryId})`,
                          ''
                        ].join('\n');
                      }
                    } catch (e) {
                      console.log(`Failed to fetch OSV data: ${e.message}`);
                    }
                  }
                  
                  // Snyk vulnerability database for fix suggestions when available
                  let snykData = "";
                  try {
                    const snykResponse = await fetch(`https://security.snyk.io/api/vuln/${primaryId}`);
                    if (snykResponse.ok) {
                      const snykInfo = await snykResponse.json();
                      
                      // Check if we have useful data
                      if (snykInfo.id) {
                        // Extract remediation advice
                        let remediation = "No specific remediation steps available";
                        if (snykInfo.remediation) {
                          remediation = snykInfo.remediation.advice || remediation;
                        }
                        
                        // Check for patches
                        let patches = "No patches available";
                        if (snykInfo.patches && snykInfo.patches.length > 0) {
                          patches = snykInfo.patches.map(p => `- ${p.id} (${p.modificationTime})`).join('\n');
                        }
                        
                        snykData = [
                          '### Snyk Security Intelligence',
                          `- **Vulnerability Type**: ${snykInfo.type || 'Not specified'}`,
                          `- **Exploit Maturity**: ${snykInfo.exploitMaturity || 'Unknown'}`,
                          '',
                          '#### Remediation Advice',
                          remediation,
                          '',
                          '#### Available Patches',
                          patches,
                          '',
                          `- **More Details**: [Snyk Advisory](https://security.snyk.io/vuln/${primaryId})`,
                          ''
                        ].join('\n');
                      }
                    }
                  } catch (e) {
                    console.log(`Failed to fetch Snyk data: ${e.message}`);
                  }
                  
                  // Determine risk level based on CVSS score
                  let riskLevel = "Unknown";
                  if (cvssScore !== 'N/A') {
                    const score = parseFloat(cvssScore);
                    if (score >= 9.0) riskLevel = "Critical";
                    else if (score >= 7.0) riskLevel = "High";
                    else if (score >= 4.0) riskLevel = "Medium";
                    else riskLevel = "Low";
                  } else {
                    riskLevel = alert.securityVulnerability.severity;
                  }
                  
                  // CVSS Vector explanation
                  let cvssExplainer = "";
                  if (cvssVector && cvssVector !== 'N/A') {
                    const vectorParts = cvssVector.replace('CVSS:3.1/', '').split('/');
                    const explanations = {
                      'AV:N': 'Network - Exploitable remotely',
                      'AV:A': 'Adjacent - Requires local network access',
                      'AV:L': 'Local - Requires local access',
                      'AV:P': 'Physical - Requires physical access',
                      'AC:L': 'Low complexity attack',
                      'AC:H': 'High complexity attack',
                      'PR:N': 'No privileges required',
                      'PR:L': 'Low privileges required',
                      'PR:H': 'High privileges required',
                      'UI:N': 'No user interaction required',
                      'UI:R': 'User interaction required',
                      'S:U': 'Scope unchanged',
                      'S:C': 'Scope changed',
                      'C:H': 'High confidentiality impact',
                      'C:L': 'Low confidentiality impact',
                      'C:N': 'No confidentiality impact',
                      'I:H': 'High integrity impact',
                      'I:L': 'Low integrity impact',
                      'I:N': 'No integrity impact',
                      'A:H': 'High availability impact',
                      'A:L': 'Low availability impact',
                      'A:N': 'No availability impact',
                    };
                    
                    const explanationList = vectorParts
                      .filter(part => explanations[part])
                      .map(part => `- ${part}: ${explanations[part]}`);
                    
                    if (explanationList.length > 0) {
                      cvssExplainer = [
                        '### CVSS Vector Explanation',
                        ...explanationList,
                        '',
                        '> CVSS (Common Vulnerability Scoring System) helps quantify the characteristics and severity of vulnerabilities.',
                        ''
                      ].join('\n');
                    }
                  }
                  
                  // Enhanced impact analysis section
                  const impactAnalysis = [
                    '### Potential Impact Analysis',
                    `Based on the ${riskLevel.toLowerCase()} severity of this vulnerability:`,
                    '',
                    `- **Data Exposure Risk**: ${riskLevel === 'Critical' || riskLevel === 'High' ? 'Significant' : 'Limited'} risk of sensitive data exposure`,
                    `- **System Integrity**: This vulnerability could ${riskLevel === 'Critical' ? 'critically compromise' : riskLevel === 'High' ? 'significantly impact' : 'potentially affect'} system integrity`,
                    `- **Service Availability**: ${riskLevel === 'Critical' ? 'May cause complete service outage' : riskLevel === 'High' ? 'Could disrupt services' : 'Minimal availability impact expected'}`,
                    '',
                    '> This is an automated impact assessment based on severity. A human review is recommended.',
                    ''
                  ].join('\n');
                  
                  // Create issue body with all the enhanced data
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueTitle,
                    body: [
                      `## Security Vulnerability (${riskLevel} Risk)`,
                      '',
                      `- **Package:** ${pkgName}`,
                      `- **Severity:** ${alert.securityVulnerability.severity}`,
                      `- **CVSS Score:** ${cvssScore} (${riskLevel})`,
                      `- **CVSS Vector:** \`${cvssVector}\``,
                      `- **Vulnerable Version:** ${alert.securityVulnerability.vulnerableVersionRange || 'Unknown'}`,
                      `- **Published:** ${publishedDate}`,
                      `- **Detected:** ${detectedDate}`,
                      '',
                      '### Identifiers',
                      allIds.length > 0 ? allIds.map(id => `- ${id}`).join('\n') : '- None available',
                      '',
                      '### Description',
                      alert.securityVulnerability.advisory.description || 'No description available',
                      '',
                      cvssExplainer,
                      '### References',
                      ...(alert.securityVulnerability.advisory.references?.map(ref => `- ${ref.url}`) || ['No references available']),
                      '',
                      impactAnalysis,
                      nvdData,
                      osvData,
                      snykData,
                      '### Remediation',
                      '1. **Update Package**: Upgrade to a non-vulnerable version as soon as possible',
                      '2. **Temporary Mitigation**: If updating is not immediately possible:',
                      '   - Consider using a different package',
                      '   - Add input validation/sanitization if it addresses the vulnerability',
                      '   - Limit access to affected components',
                      '   - Consider implementing a Web Application Firewall (WAF) rule',
                      '',
                      '### Follow-up Actions',
                      '- [ ] Assess impact on our application',
                      '- [ ] Update the vulnerable package',
                      '- [ ] Review dependency tree for transitive vulnerabilities',
                      '- [ ] Document decisions made (accept risk/mitigate/fix)',
                      '- [ ] Verify the fix is working',
                      '- [ ] Add automated tests to prevent regression',
                      '- [ ] Document remediation for security compliance',
                      '',
                      `> Alert created automatically by the security workflow. Alert ID: ${alert.id.substring(0, 8)}`,
                    ].join('\n'),
                    labels: ['security-vulnerability', alert.securityVulnerability.severity.toLowerCase(), 'dependencies', `risk:${riskLevel.toLowerCase()}`],
                  });
                  
                  console.log(`Created issue for ${pkgName} (${primaryId})`);
                } catch (error) {
                  console.error(`Error creating issue for ${pkgName}: ${error.message}`);
                }
              }
            }
            return alerts.length;

      - name: Get Code Scanning Alerts
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const alerts = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['code-scanning-alert']
            });
            
            for (const alert of alerts.data) {
              try {
                // Create a concise, readable title (max 80 chars)
                const ruleName = alert.rule.name || alert.rule.id;
                const filePathParts = alert.most_recent_instance.location.path.split('/');
                const fileName = filePathParts[filePathParts.length - 1];
                const lineNumber = alert.most_recent_instance.location.start_line;
                
                // Create a short issue title that's informative but not too long
                const issueTitle = `Code Alert: ${fileName}:${lineNumber} - ${ruleName.substring(0, 50)}`;
                
                // Check for existing issues
                const existingIssue = issues.data.find(issue => 
                  issue.body.includes(alert.rule.id) && 
                  issue.body.includes(fileName) &&
                  issue.body.includes(`line ${lineNumber}`));
                  
                if (!existingIssue) {
                  // Get CWE information if available
                  let cweInfo = "";
                  let cweRemediation = "";
                  if (alert.rule.tags) {
                    const cweTags = alert.rule.tags.filter(tag => tag.startsWith('CWE-'));
                    if (cweTags.length > 0) {
                      const cweIds = cweTags.join(', ');
                      const cweNumber = cweTags[0].replace('CWE-', '');
                      
                      try {
                        // Try to fetch detailed CWE information
                        const cweResponse = await fetch(`https://cwe.mitre.org/data/definitions/${cweNumber}.html`);
                        if (cweResponse.ok) {
                          const cweText = await cweResponse.text();
                          
                          // Simple HTML parsing to extract information (not ideal but workable)
                          let cweTitle = "Unknown CWE";
                          const titleMatch = cweText.match(/<h2>(.*?)<\/h2>/);
                          if (titleMatch && titleMatch[1]) {
                            cweTitle = titleMatch[1].replace(/CWE-\d+:\s*/, '');
                          }
                          
                          // Extract potential mitigations
                          let mitigations = [];
                          const mitigationMatches = cweText.match(/<th colspan="2">Potential Mitigations<\/th>[\s\S]*?<\/table>/);
                          if (mitigationMatches) {
                            const phasesMatches = mitigationMatches[0].match(/<b>([^<]+)<\/b>[\s\S]*?<ul>([\s\S]*?)<\/ul>/g);
                            if (phasesMatches) {
                              phasesMatches.forEach(phaseMatch => {
                                const phaseNameMatch = phaseMatch.match(/<b>([^<]+)<\/b>/);
                                if (phaseNameMatch) {
                                  const phaseName = phaseNameMatch[1];
                                  const listItemMatches = phaseMatch.match(/<li>([\s\S]*?)<\/li>/g);
                                  if (listItemMatches && listItemMatches.length > 0) {
                                    // Take just the first 2 mitigations to avoid overwhelming the issue
                                    const items = listItemMatches.slice(0, 2).map(item => {
                                      return item.replace(/<li>/, '').replace(/<\/li>/, '')
                                                .replace(/<[^>]+>/g, '') // Remove remaining HTML tags
                                                .trim();
                                    });
                                    mitigations.push(`**${phaseName}**:\n${items.map(i => `  - ${i}`).join('\n')}`);
                                  }
                                }
                              });
                            }
                          }
                          
                          if (mitigations.length > 0) {
                            cweRemediation = [
                              '### CWE-Specific Mitigations',
                              ...mitigations,
                              '',
                            ].join('\n');
                          }
                          
                          cweInfo = [
                            '### CWE Information',
                            `- **CWE IDs**: ${cweIds}`,
                            `- **Title**: ${cweTitle}`,
                            `- **Resources**: [MITRE CWE Database](https://cwe.mitre.org/data/definitions/${cweNumber}.html)`,
                            ''
                          ].join('\n');
                        }
                      } catch (e) {
                        console.log(`Failed to get CWE info: ${e.message}`);
                        // Fallback to basic info
                        cweInfo = [
                          '### CWE Information',
                          `- **CWE IDs**: ${cweIds}`,
                          `- **Resources**: [MITRE CWE Database](https://cwe.mitre.org/data/definitions/${cweNumber}.html)`,
                          ''
                        ].join('\n');
                      }
                    }
                  }
                  
                  // Determine security level with a fallback
                  const securityLevel = alert.rule.security_severity_level || 
                                       (alert.rule.severity === 'error' ? 'high' : 
                                        alert.rule.severity === 'warning' ? 'medium' : 'low');
                  
                  // Format creation date
                  const alertCreatedAt = new Date(alert.created_at).toISOString().split('T')[0];
                  
                  // Prepare rule tags in a readable format
                  const ruleTags = alert.rule.tags ? 
                    alert.rule.tags.map(tag => `\`${tag}\``).join(', ') : 
                    'None';
                  
                  // Try to get the actual code from the repository
                  let codeSnippet = "```\n// Code snippet could not be retrieved\n```";
                  try {
                    // Get file content
                    const contentResponse = await github.rest.repos.getContent({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      path: alert.most_recent_instance.location.path,
                      ref: 'main' // Can be adjusted as needed
                    });
                    
                    if (contentResponse.data && contentResponse.data.content) {
                      const fileContent = Buffer.from(contentResponse.data.content, 'base64').toString();
                      const fileLines = fileContent.split('\n');
                      
                      // Get a snippet with context (5 lines before and after)
                      const startLineIndex = Math.max(0, alert.most_recent_instance.location.start_line - 5);
                      const endLineIndex = Math.min(fileLines.length, alert.most_recent_instance.location.end_line + 5);
                      
                      const snippetLines = [];
                      for (let i = startLineIndex; i < endLineIndex; i++) {
                        // Mark the vulnerable lines
                        if (i >= alert.most_recent_instance.location.start_line - 1 && 
                            i <= alert.most_recent_instance.location.end_line - 1) {
                          snippetLines.push(`>${i+1}: ${fileLines[i]}`);
                        } else {
                          snippetLines.push(` ${i+1}: ${fileLines[i]}`);
                        }
                      }
                      
                      // Get file extension for syntax highlighting
                      const fileExt = fileName.split('.').pop() || 'txt';
                      
                      codeSnippet = [
                        `\`\`\`${fileExt}`,
                        snippetLines.join('\n'),
                        '```'
                      ].join('\n');
                    }
                  } catch (e) {
                    console.log(`Could not retrieve code snippet: ${e.message}`);
                  }
                  
                  // Create better remediation advice based on rule info
                  let remediationSteps = alert.rule.help ? 
                    alert.rule.help : 
                    'Review the code and fix the identified security issue.';
                    
                  // Add code pattern suggestions based on rule type
                  if (alert.rule.tags) {
                    if (alert.rule.tags.includes('sql-injection')) {
                      remediationSteps += '\n\n**Suggestion**: Use parameterized queries instead of string concatenation. For example:\n```\n// UNSAFE: string concatenation\nvar query = "SELECT * FROM users WHERE name = \'" + userName + "\'"\n\n// SAFE: parameterized query\nvar query = "SELECT * FROM users WHERE name = @UserName"\ncommand.Parameters.AddWithValue("@UserName", userName);\n```';
                    } else if (alert.rule.tags.includes('xss')) {
                      remediationSteps += '\n\n**Suggestion**: Use appropriate output encoding and content security policies. For example:\n```html\n<!-- UNSAFE: direct interpolation -->\n<div>${userInput}</div>\n\n<!-- SAFER: with encoding -->\n<div>${htmlEncode(userInput)}</div>\n```';
                    } else if (alert.rule.tags.some(t => t.includes('injection'))) {
                      remediationSteps += '\n\n**Suggestion**: Validate and sanitize all inputs before use. Implement input validation that accepts only expected types, lengths, formats, and ranges.';
                    } else if (alert.rule.tags.includes('path-traversal')) {
                      remediationSteps += '\n\n**Suggestion**: Use safe APIs that limit access to intended directories. Validate user input by canonicalizing paths, and then validating them against a whitelist of allowed resources.';
                    } else if (alert.rule.tags.some(t => t.includes('crypto'))) {
                      remediationSteps += '\n\n**Suggestion**: Use strong, industry-standard cryptographic algorithms, protocols, and keys. Avoid implementing custom cryptographic algorithms and use updated libraries with security fixes.';
                    }
                  }
                  
                  // Try to find similar fixes from public repos
                  let similarFixes = "";
                  try {
                    if (alert.rule.id) {
                      // Search GitHub for similar fixes using rule ID
                      const searchQuery = encodeURIComponent(`"${alert.rule.id}" fix language:${fileName.split('.').pop()}`);
                      const searchResponse = await fetch(`https://api.github.com/search/code?q=${searchQuery}&per_page=3`);
                      
                      if (searchResponse.ok) {
                        const searchResults = await searchResponse.json();
                        if (searchResults.items && searchResults.items.length > 0) {
                          const fixExamples = searchResults.items.map(item => 
                            `- [${item.repository.full_name}](${item.html_url})`
                          );
                          
                          similarFixes = [
                            '### Similar Fixes in Public Repositories',
                            ...fixExamples,
                            '',
                            '> These are examples of repositories that might contain fixes for similar issues.',
                            ''
                          ].join('\n');
                        }
                      }
                    }
                  } catch (e) {
                    console.log(`Could not find similar fixes: ${e.message}`);
                  }
                  
                  // OWASP information if relevant
                  let owaspInfo = "";
                  if (alert.rule.tags) {
                    // Map common vulnerability types to OWASP Top 10
                    const owaspMappings = {
                      'sql-injection': {id: 'A03:2021', name: 'Injection', url: 'https://owasp.org/Top10/A03_2021-Injection/'},
                      'xss': {id: 'A03:2021', name: 'Injection', url: 'https://owasp.org/Top10/A03_2021-Injection/'},
                      'command-injection': {id: 'A03:2021', name: 'Injection', url: 'https://owasp.org/Top10/A03_2021-Injection/'},
                      'insecure-design': {id: 'A04:2021', name: 'Insecure Design', url: 'https://owasp.org/Top10/A04_2021-Insecure_Design/'},
                      'security-misconfiguration': {id: 'A05:2021', name: 'Security Misconfiguration', url: 'https://owasp.org/Top10/A05_2021-Security_Misconfiguration/'},
                      'path-traversal': {id: 'A01:2021', name: 'Broken Access Control', url: 'https://owasp.org/Top10/A01_2021-Broken_Access_Control/'},
                      'insecure-authentication': {id: 'A07:2021', name: 'Identification and Authentication Failures', url: 'https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/'},
                      'insecure-default': {id: 'A05:2021', name: 'Security Misconfiguration', url: 'https://owasp.org/Top10/A05_2021-Security_Misconfiguration/'},
                    };
                    
                    // Find matching OWASP categories
                    const matchedCategories = alert.rule.tags
                      .filter(tag => Object.keys(owaspMappings).some(key => tag.includes(key)))
                      .map(tag => {
                        const mappingKey = Object.keys(owaspMappings).find(key => tag.includes(key));
                        return mappingKey ? owaspMappings[mappingKey] : null;
                      })
                      .filter(item => item !== null);
                    
                    // Deduplicate categories
                    const uniqueCategories = Array.from(new Set(matchedCategories.map(c => c.id)))
                      .map(id => matchedCategories.find(c => c.id === id));
                    
                    if (uniqueCategories.length > 0) {
                      owaspInfo = [
                        '### OWASP Top 10 Categorization',
                        ...uniqueCategories.map(cat => `- **${cat.id}**: [${cat.name}](${cat.url})`),
                        '',
                        '> The OWASP Top 10 represents the most critical security risks to web applications.',
                        ''
                      ].join('\n');
                    }
                  }
                  
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueTitle,
                    body: [
                      `## Code Scanning Alert: ${securityLevel.toUpperCase()} Severity`,
                      '',
                      `- **Rule ID**: ${alert.rule.id}`,
                      `- **Rule Name**: ${alert.rule.name || 'N/A'}`,
                      `- **Severity**: ${alert.rule.severity || 'N/A'}`,
                      `- **Security Level**: ${securityLevel}`,
                      `- **Created**: ${alertCreatedAt}`,
                      `- **File**: [${alert.most_recent_instance.location.path}:${lineNumber}](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/${alert.most_recent_instance.location.path}#L${lineNumber})`,
                      `- **Tool**: ${alert.tool.name} ${alert.tool.version || ''}`,
                      `- **Tags**: ${ruleTags}`,
                      '',
                      '### Description',
                      alert.rule.description || alert.most_recent_instance.message.text,
                      '',
                      '### Alert Message',
                      alert.most_recent_instance.message.text,
                      '',
                      '### Affected Code',
                      codeSnippet,
                      '',
                      cweInfo,
                      owaspInfo,
                      '### Remediation',
                      remediationSteps,
                      '',
                      cweRemediation,
                      similarFixes,
                      '### References',
                      `${alert.rule.help_uri ? `- [Rule Documentation](${alert.rule.help_uri})` : '- No documentation available.'}`,
                      '',
                      '### Follow-up Actions',
                      '- [ ] Review the vulnerable code',
                      '- [ ] Apply the recommended fix',
                      '- [ ] Add tests to prevent regression',
                      '- [ ] Run code scanning again to verify fix',
                      '- [ ] Request peer review of the changes',
                      '- [ ] Document the vulnerability and fix for future reference',
                      '',
                      `> Alert created automatically by the security workflow. Alert ID: ${alert.number}`,
                    ].join('\n'),
                    labels: ['code-scanning-alert', alert.rule.severity?.toLowerCase() || 'unknown', 'security', `risk:${securityLevel}`],
                  });
                  
                  console.log(`Created issue for ${fileName}:${lineNumber} - ${alert.rule.id}`);
                }
              } catch (error) {
                console.error(`Error creating issue for alert ${alert.number}: ${error.message}`);
              }
            }
            return alerts.data.length;
