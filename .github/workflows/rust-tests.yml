name: Rust Tests

on:
  push:
    branches: [ "Main" ]
  pull_request:
    branches: [ "Main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
