name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (e.g., v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Release name (defaults to tag if empty)"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
      os:
        description: "Target OS to build for (windows or macos)"
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ inputs.os == 'windows' }}
    name: Build Windows dev and release executables
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

  # No source edits required; dev mode controlled via cargo feature

      - name: Build (dev profile, dev-mode feature enabled)
        run: |
          cargo build --features dev-mode

      - name: Prepare artifacts folder
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      - name: Copy dev executable
        run: |
          $devExe = "target\debug\Dungeon-Crawler-World.exe"
          if (-not (Test-Path $devExe)) {
            Write-Error "Dev executable not found: $devExe"
          }
          Copy-Item -Path $devExe -Destination "artifacts\Dungeon-Crawler-World-dev.exe" -Force

      - name: Build (release profile, dev-mode disabled)
        run: |
          cargo build --release --no-default-features

      - name: Copy release executable
        run: |
          $relExe = "target\release\Dungeon-Crawler-World.exe"
          if (-not (Test-Path $relExe)) {
            Write-Error "Release executable not found: $relExe"
          }
          Copy-Item -Path $relExe -Destination "artifacts\Dungeon-Crawler-World-release.exe" -Force

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/Dungeon-Crawler-World-dev.exe
            artifacts/Dungeon-Crawler-World-release.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    if: ${{ inputs.os == 'macos' }}
    name: Build macOS dev and release executables
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

  # No source edits required; dev mode controlled via cargo feature

      - name: Build (dev profile, dev-mode feature enabled)
        run: |
          cargo build --features dev-mode

      - name: Prepare artifacts folder
        run: |
          mkdir -p artifacts

      - name: Copy dev executable
        run: |
          DEV_BIN="target/debug/Dungeon-Crawler-World"
          test -f "$DEV_BIN" || { echo "Dev executable not found: $DEV_BIN"; exit 1; }
          cp "$DEV_BIN" "artifacts/Dungeon-Crawler-World-dev-macos"

      - name: Create .app bundle (dev)
        run: |
          APP_DIR="artifacts/Dungeon-Crawler-World-dev.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleDisplayName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleIdentifier</key>
            <string>com.julieisbaka.dungeoncrawlerworld</string>
            <key>CFBundleVersion</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleExecutable</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          install -m 755 "artifacts/Dungeon-Crawler-World-dev-macos" "$APP_DIR/Contents/MacOS/Dungeon-Crawler-World"

      - name: Create DMG (dev)
        run: |
          hdiutil create -volname "Dungeon-Crawler-World-dev" -srcfolder "artifacts/Dungeon-Crawler-World-dev.app" -ov -format UDZO "artifacts/Dungeon-Crawler-World-dev-macos.dmg"

      - name: Build (release profile, dev-mode disabled)
        run: |
          cargo build --release --no-default-features

      - name: Copy release executable
        run: |
          REL_BIN="target/release/Dungeon-Crawler-World"
          test -f "$REL_BIN" || { echo "Release executable not found: $REL_BIN"; exit 1; }
          cp "$REL_BIN" "artifacts/Dungeon-Crawler-World-release-macos"

      - name: Create .app bundle (release)
        run: |
          APP_DIR="artifacts/Dungeon-Crawler-World-release.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleDisplayName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleIdentifier</key>
            <string>com.julieisbaka.dungeoncrawlerworld</string>
            <key>CFBundleVersion</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleExecutable</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          install -m 755 "artifacts/Dungeon-Crawler-World-release-macos" "$APP_DIR/Contents/MacOS/Dungeon-Crawler-World"

      - name: Create DMG (release)
        run: |
          hdiutil create -volname "Dungeon-Crawler-World-release" -srcfolder "artifacts/Dungeon-Crawler-World-release.app" -ov -format UDZO "artifacts/Dungeon-Crawler-World-release-macos.dmg"

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/Dungeon-Crawler-World-dev-macos.dmg
            artifacts/Dungeon-Crawler-World-release-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}