name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name for the release (e.g., v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Release name (defaults to tag if empty)"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
      os:
        description: "Target OS to build for (windows or macos)"
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────

  build-windows-dev:
    if: ${{ inputs.os == 'windows' }}
    name: Build Windows dev executable
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-dev

      # No source edits required; dev mode controlled via cargo feature
      - name: Build (dev profile, dev-mode feature enabled)
        run: |
          cargo build --features dev-mode

      - name: Upload dev executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-dev-exe
          path: target\debug\Dungeon-Crawler-World.exe
          if-no-files-found: error

  build-windows-release:
    if: ${{ inputs.os == 'windows' }}
    name: Build Windows release executable
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release

      - name: Build (release profile, dev-mode disabled)
        run: |
          cargo build --release --no-default-features

      - name: Upload release executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-exe
          path: target\release\Dungeon-Crawler-World.exe
          if-no-files-found: error

  release-windows:
    if: ${{ inputs.os == 'windows' }}
    name: Create Windows GitHub Release
    needs: [build-windows-dev, build-windows-release]
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Download dev executable
        uses: actions/download-artifact@v4
        with:
          name: windows-dev-exe
          path: artifacts\dev

      - name: Download release executable
        uses: actions/download-artifact@v4
        with:
          name: windows-release-exe
          path: artifacts\release

      - name: Prepare final artifacts
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item "artifacts\dev\Dungeon-Crawler-World.exe" "artifacts\Dungeon-Crawler-World-dev.exe"
          Copy-Item "artifacts\release\Dungeon-Crawler-World.exe" "artifacts\Dungeon-Crawler-World-release.exe"

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/Dungeon-Crawler-World-dev.exe
            artifacts/Dungeon-Crawler-World-release.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── macOS ──────────────────────────────────────────────────────────────────

  build-macos-dev:
    if: ${{ inputs.os == 'macos' }}
    name: Build macOS dev executable
    runs-on: macos-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-dev

      # No source edits required; dev mode controlled via cargo feature
      - name: Build (dev profile, dev-mode feature enabled)
        run: |
          cargo build --features dev-mode

      - name: Create .app bundle (dev)
        run: |
          DEV_BIN="target/debug/Dungeon-Crawler-World"
          test -f "$DEV_BIN" || { echo "Dev executable not found: $DEV_BIN"; exit 1; }
          APP_DIR="artifacts/Dungeon-Crawler-World-dev.app"
          mkdir -p artifacts "$APP_DIR/Contents/MacOS"
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleDisplayName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleIdentifier</key>
            <string>com.julieisbaka.dungeoncrawlerworld</string>
            <key>CFBundleVersion</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleExecutable</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          install -m 755 "$DEV_BIN" "$APP_DIR/Contents/MacOS/Dungeon-Crawler-World"

      - name: Create DMG (dev)
        run: |
          hdiutil create -volname "Dungeon-Crawler-World-dev" -srcfolder "artifacts/Dungeon-Crawler-World-dev.app" -ov -format UDZO "artifacts/Dungeon-Crawler-World-dev-macos.dmg"

      - name: Upload dev DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dev-dmg
          path: artifacts/Dungeon-Crawler-World-dev-macos.dmg
          if-no-files-found: error

  build-macos-release:
    if: ${{ inputs.os == 'macos' }}
    name: Build macOS release executable
    runs-on: macos-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-release

      - name: Build (release profile, dev-mode disabled)
        run: |
          cargo build --release --no-default-features

      - name: Create .app bundle (release)
        run: |
          REL_BIN="target/release/Dungeon-Crawler-World"
          test -f "$REL_BIN" || { echo "Release executable not found: $REL_BIN"; exit 1; }
          APP_DIR="artifacts/Dungeon-Crawler-World-release.app"
          mkdir -p artifacts "$APP_DIR/Contents/MacOS"
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleDisplayName</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundleIdentifier</key>
            <string>com.julieisbaka.dungeoncrawlerworld</string>
            <key>CFBundleVersion</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ inputs.tag }}</string>
            <key>CFBundleExecutable</key>
            <string>Dungeon-Crawler-World</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          install -m 755 "$REL_BIN" "$APP_DIR/Contents/MacOS/Dungeon-Crawler-World"

      - name: Create DMG (release)
        run: |
          hdiutil create -volname "Dungeon-Crawler-World-release" -srcfolder "artifacts/Dungeon-Crawler-World-release.app" -ov -format UDZO "artifacts/Dungeon-Crawler-World-release-macos.dmg"

      - name: Upload release DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-dmg
          path: artifacts/Dungeon-Crawler-World-release-macos.dmg
          if-no-files-found: error

  release-macos:
    if: ${{ inputs.os == 'macos' }}
    name: Create macOS GitHub Release
    needs: [build-macos-dev, build-macos-release]
    runs-on: macos-latest

    steps:
      - name: Download dev DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dev-dmg
          path: artifacts

      - name: Download release DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-release-dmg
          path: artifacts

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/Dungeon-Crawler-World-dev-macos.dmg
            artifacts/Dungeon-Crawler-World-release-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}