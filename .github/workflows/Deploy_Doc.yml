name: Deploy Documentation

on:
  push:
    branches:
      - docs

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs branch
        uses: actions/checkout@v4
        with:
          ref: docs

      # Optional: Install Ruby dependencies if you use a Gemfile (for Jekyll)
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # or the version you need

      - name: Install dependencies
        run: |
          if [ -f Gemfile ]; then
            gem install bundler
            bundle install
          fi

      # Optional: Build the site (for Jekyll)
      - name: Build site with Jekyll
        run: |
          if [ -f Gemfile ]; then
            bundle exec jekyll build
          else
            echo "No Gemfile found, skipping Jekyll build."
          fi

      # No deploy step required: GitHub Pages will publish from docs branch automatically

      # Optional: Add a status message
      - name: Success message
        run: echo "Docs branch updated. GitHub Pages will publish automatically."
